name: Build payment-service

on:
  push:
    branches: [main]
  workflow_dispatch:          # allow manual trigger for demo

jobs:
  build:
    name: Maven Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Write Maven settings with JFrog credentials
      - name: Configure Maven → JFrog Artifactory
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <mirrors>
              <mirror>
                <id>jfrog-demo-mirror</id>
                <mirrorOf>*</mirrorOf>
                <url>${env.ARTIFACTORY_URL}/demo-libs-snapshot-virtual</url>
              </mirror>
            </mirrors>
            <servers>
              <server>
                <id>jfrog-demo-mirror</id>
                <username>${{ secrets.JFROG_USER }}</username>
                <password>${{ secrets.JFROG_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      # This step WILL FAIL with HTTP 403 because demo-maven-remote
      # has intentionally wrong credentials → build failure is the demo trigger
      - name: Build with Maven
        env:
          ARTIFACTORY_URL: ${{ secrets.JFROG_URL }}/artifactory
        run: |
          mvn compile --no-transfer-progress -B \
            -Dmaven.wagon.http.retryHandler.count=0

      # This step only runs if build succeeds (it won't in the demo)
      - name: Run tests
        if: success()
        run: mvn test --no-transfer-progress -B
